global:
  scrape_interval:     5s
  evaluation_interval: 5s
  external_labels:
    cluster: 'local-tracing'
    env: 'production'

rule_files:
  - "rules/*.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'local-host'

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'clickhouse'
    static_configs:
      - targets: ['clickhouse:9363']
