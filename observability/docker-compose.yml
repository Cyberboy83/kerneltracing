version: '3.8'

# ══════════════════════════════════════════════════════════════════
#  DebianTrace Pro — Observability Stack
#  Start: docker compose up -d
#  Stop:  docker compose down
#
#  Services:
#    Grafana       http://localhost:3000  (admin / tracepro2024)
#    Prometheus    http://localhost:9090
#    ClickHouse    http://localhost:8123
#    Loki          http://localhost:3100
#    Tempo         http://localhost:3200
#    Node Exporter http://localhost:9100
#    cAdvisor      http://localhost:8080
# ══════════════════════════════════════════════════════════════════

networks:
  tracing-net:
    driver: bridge

volumes:
  prometheus_data: {}
  grafana_data: {}
  clickhouse_data: {}
  loki_data: {}
  tempo_data: {}

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=90d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    networks: [tracing-net]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: tracepro2024
      GF_INSTALL_PLUGINS: >-
        grafana-piechart-panel,
        grafana-worldmap-panel,
        grafana-clock-panel,
        grafana-polystat-panel,
        natel-plotly-panel,
        grafana-clickhouse-datasource
      GF_FEATURE_TOGGLES_ENABLE: "traceToMetrics,correlations"
      GF_UNIFIED_ALERTING_ENABLED: "true"
      GF_ALERTING_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      prometheus:
        condition: service_healthy
    networks: [tracing-net]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse
    restart: unless-stopped
    ports:
      - "8123:8123"   
      - "9000:9000"    
      - "9363:9363"    
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/config.xml:/etc/clickhouse-server/config.d/custom.xml:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks: [tracing-net]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5


  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml:ro
    command: -config.file=/etc/loki/local-config.yaml
    networks: [tracing-net]

  tempo:
    image: grafana/tempo:latest
    container_name: tempo
    restart: unless-stopped
    ports:
      - "3200:3200"    
      - "4317:4317"    
      - "4318:4318"    
      - "9411:9411"    
    volumes:
      - tempo_data:/var/tempo
      - ./tempo/tempo-config.yml:/etc/tempo/tempo.yaml:ro
    command: -config.file=/etc/tempo/tempo.yaml
    networks: [tracing-net]
    
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
      - '--collector.perf'
      - '--collector.buddyinfo'
      - '--collector.interrupts'
      - '--collector.ksmd'
      - '--collector.meminfo_numa'
      - '--collector.mountstats'
      - '--collector.network_route'
      - '--collector.slabinfo'
      - '--collector.tcpstat'
      - '--collector.xfs'
    network_mode: host
    pid: host
  
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    networks: [tracing-net]
