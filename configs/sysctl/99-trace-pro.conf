# ══════════════════════════════════════════════════════════════════
#  DebianTrace Pro — Kernel sysctl tuning for tracing & profiling
#  Deploy: sudo cp 99-trace-pro.conf /etc/sysctl.d/
#          sudo sysctl -p /etc/sysctl.d/99-trace-pro.conf
# ══════════════════════════════════════════════════════════════════

# ─── eBPF JIT ─────────────────────────────────────────────────────
# Required for eBPF performance — JIT compiles BPF bytecode to native
net.core.bpf_jit_enable = 1
net.core.bpf_jit_kallsyms = 1
net.core.bpf_jit_limit = 264241152

# ─── perf Events ──────────────────────────────────────────────────
# 1 = kernel profiling ok, no raw tracepoints for unpriv users
# Set to -1 for fully unrestricted (not recommended in prod)
kernel.perf_event_paranoid = 1
kernel.perf_event_mlock_kb = 16384
kernel.perf_cpu_time_max_percent = 25
kernel.perf_event_max_stack = 127
kernel.perf_event_max_contexts_per_stack = 8

# ─── Kernel Pointer Exposure ──────────────────────────────────────
# 0 = show kernel pointers (needed for tracing symbol resolution)
# Revert to 1 in hardened production environments
kernel.kptr_restrict = 0

# ─── ftrace ───────────────────────────────────────────────────────
kernel.ftrace_enabled = 1

# ─── Scheduler ────────────────────────────────────────────────────
# Enable scheduler statistics for latency analysis
kernel.sched_schedstats = 1

# ─── Watchdog ─────────────────────────────────────────────────────
# Disable NMI watchdog to reduce profiling noise
# Re-enable if system becomes unstable: echo 1 > /proc/sys/kernel/nmi_watchdog
kernel.nmi_watchdog = 0

# ─── Memory ───────────────────────────────────────────────────────
vm.swappiness = 10
vm.dirty_ratio = 15
vm.dirty_background_ratio = 5
# Allow memory overcommit (needed for some tracing tools and Spark)
vm.overcommit_memory = 1

# ─── Network (for high-rate packet capture) ───────────────────────
net.core.rmem_max = 134217728
net.core.wmem_max = 134217728
net.core.netdev_max_backlog = 250000

# ─── File Descriptors ─────────────────────────────────────────────
fs.file-max = 2097152
fs.nr_open = 1048576

# ─── PID Space ────────────────────────────────────────────────────
# Larger PID space for comprehensive process tracing in busy systems
kernel.pid_max = 4194304
